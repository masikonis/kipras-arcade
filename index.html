<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kipras Arcade</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link rel="apple-touch-icon" id="appleTouchIcon">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0a1a;
            --bg-card: #12122a;
            --accent-1: #ff6b6b;
            --accent-2: #4ecdc4;
            --accent-3: #ffe66d;
            --accent-4: #a855f7;
            --accent-5: #38bdf8;
            --text: #e8e8f0;
            --text-dim: #8888aa;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Starfield background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 25% 35%, rgba(78,205,196,0.6), transparent),
                radial-gradient(2px 2px at 75% 65%, rgba(255,107,107,0.6), transparent);
            background-size: 200px 200px;
            animation: twinkle 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Bungee', cursive;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            line-height: 1.1;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.2); transform: scale(1.02); }
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-top: 8px;
            font-weight: 600;
        }

        .game-count {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 18px;
            background: rgba(78, 205, 196, 0.15);
            border: 1px solid rgba(78, 205, 196, 0.3);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--accent-2);
            font-weight: 800;
        }

        /* Game grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }

        .game-card:hover .card-thumb {
            transform: scale(1.15) rotate(5deg);
        }

        .card-banner {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, var(--bg-card) 100%);
        }

        .card-thumb {
            font-size: 4rem;
            z-index: 1;
            transition: transform 0.3s;
        }

        .card-body {
            padding: 16px 20px 20px;
        }

        .card-body h3 {
            font-family: 'Bungee', cursive;
            font-size: 1.25rem;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .card-body p {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .card-date {
            margin-top: 12px;
            font-size: 0.7rem;
            color: var(--text-dim);
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .play-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 14px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-4));
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 16px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--accent-2);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* Card entrance animation */
        .game-card {
            opacity: 0;
            animation: cardIn 0.5s ease forwards;
        }
        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.2s; }
        .game-card:nth-child(3) { animation-delay: 0.3s; }
        .game-card:nth-child(4) { animation-delay: 0.4s; }
        .game-card:nth-child(5) { animation-delay: 0.5s; }
        .game-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎮 Kipras Arcade</h1>
            <div class="subtitle">Sukurta su vaizduote ir AI</div>
            <div class="game-count" id="gameCount">Kraunama...</div>
        </header>

        <div class="games-grid" id="gamesGrid">
            <div class="loading">Kraunami žaidimai</div>
        </div>

        <footer class="footer">
            Sukurta su ❤️ ir Claude Code
        </footer>
    </div>

    <script>
        const ACCENT_COLORS = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a855f7', '#38bdf8', '#fb923c'];

        async function loadGames() {
            const grid = document.getElementById('gamesGrid');
            const counter = document.getElementById('gameCount');

            try {
                const resp = await fetch('games/games.json');
                const games = await resp.json();

                if (games.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <span class="emoji">🚀</span>
                            <p>Žaidimų dar nėra! Atidaryk Claude Code ir pasakyk:<br>
                            <strong>„Sukurk naują žaidimą, kuriame..."</strong></p>
                        </div>`;
                    counter.textContent = '0 žaidimų';
                    return;
                }

                const gameWord = games.length === 1 ? 'žaidimas' : (games.length < 10 && games.length > 1) ? 'žaidimai' : 'žaidimų';
                counter.textContent = `${games.length} ${gameWord}`;

                grid.innerHTML = games.map((game, i) => {
                    const color = game.color || ACCENT_COLORS[i % ACCENT_COLORS.length];
                    const dateStr = game.added
                        ? new Date(game.added + 'T00:00:00').toLocaleDateString('lt-LT', { month: 'long', day: 'numeric', year: 'numeric' })
                        : '';
                    return `
                        <a class="game-card" href="games/${game.id}/index.html">
                            <div class="card-banner" style="background: linear-gradient(135deg, ${color}, ${color}88)">
                                <span class="card-thumb">${game.emoji || '🎮'}</span>
                            </div>
                            <div class="card-body">
                                <h3>${game.title}</h3>
                                <p>${game.description}</p>
                                ${dateStr ? `<div class="card-date">${dateStr}</div>` : ''}
                                <span class="play-badge">▶ Žaisti</span>
                            </div>
                        </a>`;
                }).join('');

            } catch (err) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">🔧</span>
                        <p>Nepavyko užkrauti žaidimų. Patikrink, ar yra <code>games/games.json</code>!</p>
                    </div>`;
                counter.textContent = 'Error';
            }
        }

        loadGames();

        // Generate Apple touch icon from emoji
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = 180; canvas.height = 180;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, 180, 180);
            ctx.font = '140px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎮', 90, 100);
            document.getElementById('appleTouchIcon').href = canvas.toDataURL('image/png');
        })();
    </script>
</body>
</html>
