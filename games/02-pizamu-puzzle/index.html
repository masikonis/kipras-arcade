<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧩 Pižamų dienos Puzzle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <script>
    // ============================================
    //  🧩 PIŽAMŲ DIENOS PUZZLE
    //  Sliding tile puzzle with a photo
    // ============================================

    const GAME_WIDTH = 480;
    const GAME_HEIGHT = 640;
    const GRID_SIZE = 4;
    const TILE_SIZE = 108;
    const TILE_GAP = 4;
    const GRID_TOTAL = TILE_SIZE * GRID_SIZE + TILE_GAP * (GRID_SIZE - 1);
    const GRID_X = (GAME_WIDTH - GRID_TOTAL) / 2;
    const GRID_Y = 130;

    // --- MENU SCENE ---
    class MenuScene extends Phaser.Scene {
        constructor() { super('MenuScene'); }

        preload() {
            this.load.image('photo', 'pizamu_diena.jpg');
        }

        create() {
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x0a0a2e, 0x0a0a2e, 0x1a1a4e, 0x1a1a4e);
            bg.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Decorative stars
            for (let i = 0; i < 40; i++) {
                const x = Phaser.Math.Between(0, GAME_WIDTH);
                const y = Phaser.Math.Between(0, GAME_HEIGHT);
                const size = Phaser.Math.Between(1, 3);
                const star = this.add.circle(x, y, size, 0xffffff, Math.random() * 0.6 + 0.2);
                this.tweens.add({
                    targets: star, alpha: 0.1,
                    duration: Phaser.Math.Between(1000, 3000),
                    yoyo: true, repeat: -1
                });
            }

            // Title
            this.add.text(GAME_WIDTH / 2, 60, '🧩', { fontSize: '64px' }).setOrigin(0.5);

            this.add.text(GAME_WIDTH / 2, 130, 'PIŽAMŲ DIENOS\nPUZZLE', {
                fontSize: '36px', fontFamily: 'Arial',
                fontStyle: 'bold', color: '#ffe66d',
                align: 'center', lineSpacing: 8
            }).setOrigin(0.5);

            // Photo preview
            const photo = this.add.image(GAME_WIDTH / 2, 340, 'photo');
            const previewSize = 240;
            photo.setDisplaySize(previewSize, previewSize);
            photo.setAlpha(0.9);

            // Rounded border around photo
            const border = this.add.graphics();
            border.lineStyle(3, 0x4ecdc4, 0.8);
            border.strokeRoundedRect(
                GAME_WIDTH / 2 - previewSize / 2 - 4,
                340 - previewSize / 2 - 4,
                previewSize + 8, previewSize + 8, 12
            );

            // Difficulty buttons
            const difficulties = [
                { label: '🟢  LENGVAS (3×3)', grid: 3, color: 0x4ecdc4 },
                { label: '🟡  VIDUTINIS (4×4)', grid: 4, color: 0xffe66d },
                { label: '🔴  SUNKUS (5×5)', grid: 5, color: 0xff6b6b }
            ];

            difficulties.forEach((diff, i) => {
                const y = 500 + i * 54;
                const btn = this.add.rectangle(GAME_WIDTH / 2, y, 260, 44, diff.color, 0.9)
                    .setInteractive({ useHandCursor: true });
                btn.setStrokeStyle(2, 0xffffff, 0.2);

                const text = this.add.text(GAME_WIDTH / 2, y, diff.label, {
                    fontSize: '18px', fontFamily: 'Arial',
                    fontStyle: 'bold', color: '#0a0a2e'
                }).setOrigin(0.5);

                btn.on('pointerover', () => { btn.setScale(1.05); text.setScale(1.05); });
                btn.on('pointerout', () => { btn.setScale(1); text.setScale(1); });
                btn.on('pointerdown', () => this.scene.start('GameScene', { gridSize: diff.grid }));
            });
        }
    }

    // --- GAME SCENE ---
    class GameScene extends Phaser.Scene {
        constructor() { super('GameScene'); }

        create(data) {
            this.gridSize = data.gridSize || GRID_SIZE;
            this.tileSize = Math.floor((GAME_WIDTH - 40 - (this.gridSize - 1) * TILE_GAP) / this.gridSize);
            this.gridTotal = this.tileSize * this.gridSize + TILE_GAP * (this.gridSize - 1);
            this.gridX = (GAME_WIDTH - this.gridTotal) / 2;
            this.gridY = 130;
            this.moves = 0;
            this.startTime = Date.now();
            this.solved = false;

            // Background
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x0a0a2e, 0x0a0a2e, 0x1a1a4e, 0x1a1a4e);
            bg.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Title
            this.add.text(GAME_WIDTH / 2, 24, '🧩 Pižamų dienos Puzzle', {
                fontSize: '22px', fontFamily: 'Arial',
                fontStyle: 'bold', color: '#ffe66d'
            }).setOrigin(0.5);

            // UI
            this.movesText = this.add.text(16, 60, 'Ėjimai: 0', {
                fontSize: '18px', fontFamily: 'Arial',
                fontStyle: 'bold', color: '#4ecdc4'
            });

            this.timeText = this.add.text(GAME_WIDTH - 16, 60, 'Laikas: 0:00', {
                fontSize: '18px', fontFamily: 'Arial',
                fontStyle: 'bold', color: '#4ecdc4'
            }).setOrigin(1, 0);

            // Hint button
            const hintBtn = this.add.rectangle(GAME_WIDTH / 2, 90, 140, 32, 0x2a2a4e)
                .setInteractive({ useHandCursor: true });
            hintBtn.setStrokeStyle(1, 0x4ecdc4, 0.4);
            this.add.text(GAME_WIDTH / 2, 90, '👁️ Paveikslėlis', {
                fontSize: '13px', fontFamily: 'Arial', color: '#8888aa'
            }).setOrigin(0.5);

            // Hint overlay (hidden)
            this.hintOverlay = this.add.image(
                this.gridX + this.gridTotal / 2,
                this.gridY + this.gridTotal / 2,
                'photo'
            );
            this.hintOverlay.setDisplaySize(this.gridTotal, this.gridTotal);
            this.hintOverlay.setAlpha(0);
            this.hintOverlay.setDepth(100);

            hintBtn.on('pointerdown', () => { this.hintOverlay.setAlpha(0.85); });
            hintBtn.on('pointerup', () => { this.hintOverlay.setAlpha(0); });
            hintBtn.on('pointerout', () => { this.hintOverlay.setAlpha(0); });

            // Create puzzle grid border
            const gridBorder = this.add.graphics();
            gridBorder.lineStyle(2, 0x4ecdc4, 0.3);
            gridBorder.strokeRoundedRect(
                this.gridX - 6, this.gridY - 6,
                this.gridTotal + 12, this.gridTotal + 12, 8
            );

            // Create tiles from photo
            this.createTiles();

            // Back to menu button
            const bottomY = this.gridY + this.gridTotal + 30;
            const menuBtn = this.add.rectangle(GAME_WIDTH / 2, bottomY, 160, 40, 0x2a2a4e)
                .setInteractive({ useHandCursor: true });
            menuBtn.setStrokeStyle(1, 0x4ecdc4, 0.5);
            this.add.text(GAME_WIDTH / 2, bottomY, '🏠 MENIU', {
                fontSize: '16px', fontFamily: 'Arial',
                fontStyle: 'bold', color: '#4ecdc4'
            }).setOrigin(0.5);
            menuBtn.on('pointerdown', () => this.scene.start('MenuScene'));

            // Timer update
            this.time.addEvent({
                delay: 1000,
                callback: this.updateTimer,
                callbackScope: this,
                loop: true
            });
        }

        createTiles() {
            const photo = this.textures.get('photo').getSourceImage();
            const n = this.gridSize;

            // Create a canvas to crop photo to square and slice
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const cropSize = Math.min(photo.width, photo.height);
            const sx = (photo.width - cropSize) / 2;
            const sy = (photo.height - cropSize) / 2;

            // Create individual tile textures
            const tilePx = Math.floor(cropSize / n);
            canvas.width = tilePx;
            canvas.height = tilePx;

            for (let row = 0; row < n; row++) {
                for (let col = 0; col < n; col++) {
                    ctx.clearRect(0, 0, tilePx, tilePx);
                    ctx.drawImage(photo,
                        sx + col * tilePx, sy + row * tilePx, tilePx, tilePx,
                        0, 0, tilePx, tilePx
                    );
                    const key = `tile_${row}_${col}`;
                    if (this.textures.exists(key)) this.textures.remove(key);
                    this.textures.addCanvas(key, canvas);
                }
            }

            // Build grid state: each cell holds { row, col } of the tile's correct position
            // Last cell (n-1, n-1) is empty
            this.grid = [];
            this.tiles = [];
            this.emptyRow = n - 1;
            this.emptyCol = n - 1;

            for (let r = 0; r < n; r++) {
                this.grid[r] = [];
                this.tiles[r] = [];
                for (let c = 0; c < n; c++) {
                    if (r === n - 1 && c === n - 1) {
                        this.grid[r][c] = null; // empty space
                        this.tiles[r][c] = null;
                    } else {
                        this.grid[r][c] = { row: r, col: c };
                    }
                }
            }

            // Shuffle by making valid moves (ensures solvability)
            const shuffleMoves = n * n * 20;
            for (let i = 0; i < shuffleMoves; i++) {
                const neighbors = this.getNeighbors(this.emptyRow, this.emptyCol);
                const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
                this.grid[this.emptyRow][this.emptyCol] = this.grid[pick.r][pick.c];
                this.grid[pick.r][pick.c] = null;
                this.emptyRow = pick.r;
                this.emptyCol = pick.c;
            }

            // Create tile sprites
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    if (this.grid[r][c] === null) {
                        this.tiles[r][c] = null;
                        continue;
                    }
                    const data = this.grid[r][c];
                    const key = `tile_${data.row}_${data.col}`;
                    const x = this.gridX + c * (this.tileSize + TILE_GAP) + this.tileSize / 2;
                    const y = this.gridY + r * (this.tileSize + TILE_GAP) + this.tileSize / 2;

                    const tile = this.add.image(x, y, key);
                    tile.setDisplaySize(this.tileSize, this.tileSize);
                    tile.setInteractive({ useHandCursor: true });
                    tile.setData('gridRow', r);
                    tile.setData('gridCol', c);

                    tile.on('pointerdown', () => this.onTileClick(tile));

                    this.tiles[r][c] = tile;
                }
            }
        }

        getNeighbors(r, c) {
            const n = this.gridSize;
            const neighbors = [];
            if (r > 0) neighbors.push({ r: r - 1, c });
            if (r < n - 1) neighbors.push({ r: r + 1, c });
            if (c > 0) neighbors.push({ r, c: c - 1 });
            if (c < n - 1) neighbors.push({ r, c: c + 1 });
            return neighbors;
        }

        onTileClick(tile) {
            if (this.solved) return;

            const r = tile.getData('gridRow');
            const c = tile.getData('gridCol');

            // Check if adjacent to empty space
            const dr = Math.abs(r - this.emptyRow);
            const dc = Math.abs(c - this.emptyCol);
            if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                // Swap with empty space
                const newX = this.gridX + this.emptyCol * (this.tileSize + TILE_GAP) + this.tileSize / 2;
                const newY = this.gridY + this.emptyRow * (this.tileSize + TILE_GAP) + this.tileSize / 2;

                const oldEmptyR = this.emptyRow;
                const oldEmptyC = this.emptyCol;

                // Update grid state
                this.grid[oldEmptyR][oldEmptyC] = this.grid[r][c];
                this.grid[r][c] = null;
                this.tiles[oldEmptyR][oldEmptyC] = tile;
                this.tiles[r][c] = null;
                this.emptyRow = r;
                this.emptyCol = c;

                // Animate tile
                this.tweens.add({
                    targets: tile,
                    x: newX, y: newY,
                    duration: 120,
                    ease: 'Power2'
                });

                tile.setData('gridRow', oldEmptyR);
                tile.setData('gridCol', oldEmptyC);

                this.moves++;
                this.movesText.setText('Ėjimai: ' + this.moves);

                // Check win
                this.time.delayedCall(150, () => this.checkWin());
            }
        }

        checkWin() {
            const n = this.gridSize;
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    if (r === n - 1 && c === n - 1) continue;
                    const data = this.grid[r][c];
                    if (!data || data.row !== r || data.col !== c) return;
                }
            }

            // Solved!
            this.solved = true;
            const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;

            // Fill in the last tile
            const key = `tile_${n - 1}_${n - 1}`;
            const x = this.gridX + (n - 1) * (this.tileSize + TILE_GAP) + this.tileSize / 2;
            const y = this.gridY + (n - 1) * (this.tileSize + TILE_GAP) + this.tileSize / 2;
            const lastTile = this.add.image(x, y, key);
            lastTile.setDisplaySize(this.tileSize, this.tileSize);
            lastTile.setAlpha(0);
            this.tweens.add({ targets: lastTile, alpha: 1, duration: 500 });

            // Victory overlay
            this.time.delayedCall(600, () => {
                const overlay = this.add.rectangle(
                    GAME_WIDTH / 2, GAME_HEIGHT / 2,
                    GAME_WIDTH, GAME_HEIGHT, 0x000000, 0
                );
                this.tweens.add({ targets: overlay, fillAlpha: 0.7, duration: 500 });

                this.time.delayedCall(400, () => {
                    this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 80, '🎉 SUDĖTA!', {
                        fontSize: '40px', fontFamily: 'Arial',
                        fontStyle: 'bold', color: '#ffe66d'
                    }).setOrigin(0.5);

                    this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 20, `Ėjimai: ${this.moves}`, {
                        fontSize: '24px', fontFamily: 'Arial',
                        fontStyle: 'bold', color: '#4ecdc4'
                    }).setOrigin(0.5);

                    this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20, `Laikas: ${timeStr}`, {
                        fontSize: '24px', fontFamily: 'Arial',
                        fontStyle: 'bold', color: '#4ecdc4'
                    }).setOrigin(0.5);

                    // Play again
                    const btn = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 80, 200, 50, 0x4ecdc4)
                        .setInteractive({ useHandCursor: true });
                    this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 80, '🔄 IŠ NAUJO', {
                        fontSize: '20px', fontFamily: 'Arial',
                        fontStyle: 'bold', color: '#0a0a2e'
                    }).setOrigin(0.5);
                    btn.on('pointerover', () => btn.setFillStyle(0x6ee7de));
                    btn.on('pointerout', () => btn.setFillStyle(0x4ecdc4));
                    btn.on('pointerdown', () => this.scene.start('GameScene', { gridSize: this.gridSize }));

                    // Menu
                    const menuBtn = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 140, 200, 50, 0x2a2a4e)
                        .setInteractive({ useHandCursor: true });
                    menuBtn.setStrokeStyle(1, 0x4ecdc4, 0.5);
                    this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 140, '🏠 MENIU', {
                        fontSize: '20px', fontFamily: 'Arial',
                        fontStyle: 'bold', color: '#4ecdc4'
                    }).setOrigin(0.5);
                    menuBtn.on('pointerdown', () => this.scene.start('MenuScene'));
                });
            });
        }

        updateTimer() {
            if (this.solved) return;
            const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            this.timeText.setText(`Laikas: ${minutes}:${seconds.toString().padStart(2, '0')}`);
        }
    }

    // --- LAUNCH GAME ---
    const config = {
        type: Phaser.AUTO,
        width: GAME_WIDTH,
        height: GAME_HEIGHT,
        parent: 'game-container',
        backgroundColor: '#0a0a2e',
        scene: [MenuScene, GameScene],
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
            width: GAME_WIDTH,
            height: GAME_HEIGHT
        }
    };

    const game = new Phaser.Game(config);
    </script>
</body>
</html>
